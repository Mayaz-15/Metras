<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METRAS | Sign Up</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script type="module" src="../js/signup.js" defer></script>
</head>
<body class="login-body">

    <header class="topbar">
        <div class="brand">
            <a href="index.html" class="logo-link">
                <img src="../assets/logo.png" alt="METRAS Logo" class="logo-img">
            </a>
        </div>
        <nav class="topnav">
            <a class="navlink" href="index.html">HOME</a>
            <a class="navlink" href="login.html">LOGIN</a>
            <a class="navlink active" href="signup.html">SIGN UP</a>
        </nav>
    </header>

    <main class="login-main">
        <div class="login-card">
            <div class="login-header">
                <h1>Create Account</h1>
                <p>Your email must be registered by the admin first</p>
            </div>

            <form id="signupForm" class="login-form">
                <div class="field">
                    <label class="label" for="email">Email Address</label>
                    <input type="email" id="email" class="input" placeholder="name@company.com" required>
                </div>

                <div class="field">
                    <label class="label" for="password">Password</label>
                    <input type="password" id="password" class="input" placeholder="At least 6 characters" required>
                </div>

                <div class="field">
                    <label class="label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="input" placeholder="Repeat your password" required>
                </div>

                <div id="signupError" class="error-message" hidden></div>
                <div id="signupSuccess" class="success-message" hidden></div>

                <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
                    Create Account
                </button>

                <div class="login-loading" id="signupLoading" style="display:none;">
                    <div class="spinner"></div>
                    <span>Creating account...</span>
                </div>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="login.html" style="color:var(--primary-2);font-weight:800;">Sign in →</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-left">
                <div class="footer-logo">METRAS</div>
            </div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
            </div>
            <div class="footer-right">
                <p>© 2026 METRAS</p>
            </div>
        </div>
    </footer>

</body>
</html>
